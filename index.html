<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Remove Background</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Background Remover</h1>
            <p>Upload an image to automatically remove its background.</p>
        </header>

        <!-- Upload Section -->
        <section class="upload-section">
            <input type="file" id="imageInput" accept="image/png, image/jpeg, image/jpg" hidden>
            <label for="imageInput" class="upload-label">
                <span class="upload-icon">📁</span>
                <span class="upload-text">Click to Select Image</span>
                <span class="upload-subtext">Supports JPG, PNG</span>
            </label>
        </section>

        <!-- Preview Section -->
        <section class="preview-section" id="previewSection" style="display: none;">
            <h3>Original Preview</h3>
            <div class="image-box">
                <img id="imagePreview" src="" alt="Image Preview">
            </div>
        </section>

        <!-- Options Section -->
        <section class="options-section" id="optionsSection" style="display: none;">
            <div class="dropdown-group">
                <div class="dropdown">
                    <label for="ratioSelect">Aspect Ratio</label>
                    <select id="ratioSelect">
                        <option value="1:1">1:1 (Square)</option>
                        <option value="4:5">4:5 (Portrait)</option>
                        <option value="16:9">16:9 (Widescreen)</option>
                        <option value="9:16">9:16 (Story/Reel)</option>
                        <option value="3:2">3:2 (Classic Photo)</option>
                        <option value="original" selected>Keep Original</option>
                    </select>
                </div>
                <div class="dropdown">
                    <label for="sizeSelect">Output Size (Width)</label>
                    <select id="sizeSelect">
                        <option value="original" selected>Keep Original Size</option>
                        <option value="512">512px</option>
                        <option value="1024">1024px</option>
                        <option value="1080">1080px</option>
                        <option value="1280">1280px</option>
                        <option value="1920">1920px</option>
                    </select>
                </div>
            </div>
            
            <!-- Submit Button -->
            <button id="submitBtn" class="primary-btn">Remove Background</button>
            <div id="errorMessage" class="error-text"></div>
        </section>

        <!-- Result Section -->
        <section class="result-section" id="resultSection" style="display: none;">
            <h3>Result</h3>
            <div class="image-box checkerboard">
                <img id="imageResult" src="" alt="Result Image">
            </div>
            <button id="downloadBtn" class="success-btn">Download Image</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
